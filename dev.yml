services:
  postgres:
    image: postgres:16
    container_name: postgres

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis

    # ports:
    #   - "${REDIS_PORT}:5432"

    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf

    command: redis-server /usr/local/etc/redis/redis.conf
  
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    
    container_name: migrate

    env_file:
      - .env

    command: >
      bash docker/migrate.sh

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: app

    depends_on:
      - postgres
      - redis

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    expose:
      - "8000"

    # ports:
    #   - "8000:8000"

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: celery

    depends_on:
      - redis
      - postgres

    command: >
      celery -A app.core.celery.celery
      worker --loglevel=info

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: flower

    depends_on:
      - redis

    command: >
      celery -A app.core.celery.celery
      flower --port=5555

    ports:
      - "5555:5555"

  nginx:
    image: nginx:latest

    container_name: nginx

    depends_on:
      - backend

    ports:
      - "80:80"

    environment:
      BACKEND_HOST: app

    volumes:
      - ./docker/nginx.conf.template:/etc/nginx/templates/default.conf.template

volumes:
  postgres_data:
